<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIAB Search</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#202124;height:100vh;display:flex;flex-direction:column}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:80px}
.logo{font-size:62px;font-weight:700;letter-spacing:-2px;margin-bottom:28px}
.logo span:nth-child(1){color:#4285f4}
.logo span:nth-child(2){color:#ea4335}
.logo span:nth-child(3){color:#fbbc04}
.logo span:nth-child(4){color:#4285f4}

/* ── Search bar wrapper (needed for dropdown positioning) ── */
.bar-wrap{position:relative;width:560px;max-width:calc(100vw - 40px)}
.bar{display:flex;align-items:center;width:100%;border:1px solid #dfe1e5;border-radius:24px;padding:10px 16px;gap:10px;transition:box-shadow .2s;background:#fff;position:relative;z-index:2}
.bar:hover,.bar:focus-within{box-shadow:0 1px 6px rgba(32,33,36,.28);border-color:transparent}
.bar input{flex:1;border:none;outline:none;font-size:16px;font-family:inherit;color:#202124;background:transparent}
.bar input::placeholder{color:#9aa0a6}

/* ── Autocomplete dropdown ── */
.suggestions{
  position:absolute;top:calc(100% - 12px);left:0;right:0;
  background:#fff;border:1px solid #dfe1e5;border-top:none;
  border-radius:0 0 24px 24px;
  box-shadow:0 4px 6px rgba(32,33,36,.2);
  overflow:hidden;z-index:1;
  padding-top:10px;
  display:none;
}
.suggestions.open{display:block}
.sug-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;font-size:15px;color:#202124;
  cursor:pointer;transition:background .1s;
}
.sug-item:hover,.sug-item.active{background:#f1f3f4}
.sug-item svg{flex-shrink:0;color:#9aa0a6}
.sug-match{font-weight:600}

.btn{margin-top:26px;background:#f8f9fa;border:1px solid #f8f9fa;border-radius:4px;padding:9px 16px;font-size:14px;font-family:inherit;color:#3c4043;cursor:pointer}
.btn:hover{box-shadow:0 1px 1px rgba(0,0,0,.1);border-color:#dadce0}
footer{background:#f2f2f2;border-top:1px solid #e4e4e4;padding:14px 20px;font-size:13px;color:#70757a}
</style>
</head>
<body>
<main>
  <div class="logo"><span>I</span><span>I</span><span>A</span><span>B</span></div>

  <div class="bar-wrap">
    <div class="bar" id="bar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      <input type="text" id="q" placeholder="Search anything..." autocomplete="off" autofocus>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <button class="btn" onclick="doSearch()">IIAB Search</button>
</main>
<footer>IIAB — Offline Knowledge</footer>

<script>
/* ── Autocomplete ── */
var q        = document.getElementById('q');
var sugsEl   = document.getElementById('suggestions');
var barEl    = document.getElementById('bar');
var debTimer = null;
var activeIdx = -1;
var currentSugs = [];

q.addEventListener('input', function(){
  clearTimeout(debTimer);
  var val = this.value.trim();
  if(!val || val.length < 2){ hideSugs(); return; }
  debTimer = setTimeout(function(){ fetchSugs(val); }, 200);
});

q.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    if(activeIdx >= 0 && currentSugs[activeIdx]){
      q.value = currentSugs[activeIdx];
    }
    hideSugs();
    doSearch();
    return;
  }
  if(e.key === 'ArrowDown'){
    e.preventDefault();
    setActive(activeIdx + 1);
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    setActive(activeIdx - 1);
  } else if(e.key === 'Escape'){
    hideSugs();
  }
});

document.addEventListener('click', function(e){
  if(!e.target.closest('.bar-wrap')) hideSugs();
});

async function fetchSugs(val){
  try {
    var res  = await fetch('/suggest?q=' + encodeURIComponent(val.toLowerCase()));
    var data = await res.json();
    currentSugs = data.suggestions || [];
    renderSugs(val, currentSugs);
  } catch(err){ hideSugs(); }
}

function renderSugs(typed, sugs){
  if(!sugs.length){ hideSugs(); return; }
  activeIdx = -1;
  var html = '';
  sugs.forEach(function(s, i){
    // Bold the part the user already typed
    var safe   = s.replace(/</g,'&lt;');
    var tLen   = typed.length;
    var match  = safe.slice(0, tLen);
    var rest   = safe.slice(tLen);
    html += '<div class="sug-item" data-idx="' + i + '" onclick="pickSug(' + i + ')">'
          + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>'
          + '<span><span class="sug-match">' + match + '</span>' + rest + '</span>'
          + '</div>';
  });
  sugsEl.innerHTML = html;
  sugsEl.classList.add('open');
  // When dropdown open, merge border radius with bar
  barEl.style.borderRadius = '24px 24px 0 0';
}

function hideSugs(){
  sugsEl.classList.remove('open');
  sugsEl.innerHTML = '';
  activeIdx = -1;
  barEl.style.borderRadius = '';
}

function setActive(idx){
  var items = sugsEl.querySelectorAll('.sug-item');
  if(!items.length) return;
  idx = Math.max(-1, Math.min(idx, items.length - 1));
  items.forEach(function(el){ el.classList.remove('active'); });
  if(idx >= 0){
    items[idx].classList.add('active');
    q.value = currentSugs[idx];
  }
  activeIdx = idx;
}

function pickSug(idx){
  q.value = currentSugs[idx];
  hideSugs();
  doSearch();
}

function doSearch(){
  var v = q.value.trim();
  if(v) location.href = '/results?q=' + encodeURIComponent(v);
}
</script>
</body>
</html>

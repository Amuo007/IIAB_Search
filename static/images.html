<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIAB Images - Results</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#202124;min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
header{display:flex;align-items:center;padding:14px 20px;gap:16px;border-bottom:1px solid #ebebeb;position:sticky;top:0;background:#fff;z-index:10}
.logo{font-size:26px;font-weight:700;letter-spacing:-1px;flex-shrink:0;cursor:pointer;text-decoration:none}
.logo span:nth-child(1){color:#4285f4}
.logo span:nth-child(2){color:#ea4335}
.logo span:nth-child(3){color:#fbbc04}
.logo span:nth-child(4){color:#4285f4}
.bar{display:flex;align-items:center;flex:1;max-width:600px;border:1px solid #dfe1e5;border-radius:24px;padding:8px 14px;gap:10px;transition:box-shadow .2s}
.bar:hover,.bar:focus-within{box-shadow:0 1px 6px rgba(32,33,36,.28);border-color:transparent}
.bar input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:#202124;background:transparent}

/* ── Tab nav ── */
.tabs{display:flex;align-items:center;padding:0 160px;border-bottom:1px solid #ebebeb;gap:4px}
.tab{display:flex;align-items:center;gap:6px;padding:12px 14px;font-size:13px;color:#5f6368;cursor:pointer;border-bottom:3px solid transparent;text-decoration:none;transition:color .15s}
.tab:hover{color:#202124;background:#f1f3f4;border-radius:4px 4px 0 0}
.tab.active{color:#1a73e8;border-bottom-color:#1a73e8}
.tab svg{flex-shrink:0}

/* ── Body ── */
.body{padding:16px 160px;flex:1}
.stats{font-size:13px;color:#70757a;margin-bottom:16px}



/* ── Masonry image grid ── */
.image-grid{columns:4;column-gap:12px}
@media(max-width:1200px){.image-grid{columns:3}}
@media(max-width:800px){.image-grid{columns:2}.body{padding:12px 16px}.tabs{padding:0 16px}}
@media(max-width:500px){.image-grid{columns:2}}

.img-card{break-inside:avoid;margin-bottom:12px;border-radius:8px;overflow:hidden;cursor:pointer;position:relative;background:#f1f3f4}
.img-card:hover .img-overlay{opacity:1}
.img-card img{width:100%;display:block;border-radius:8px}
.img-placeholder{width:100%;background:#e8eaed;border-radius:8px;display:flex;align-items:center;justify-content:center}
.img-placeholder svg{opacity:.35}
.img-overlay{position:absolute;bottom:0;left:0;right:0;padding:28px 10px 10px;background:linear-gradient(transparent,rgba(0,0,0,.55));opacity:0;transition:opacity .2s;border-radius:0 0 8px 8px}
.img-source{font-size:12px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.img-title{font-size:13px;color:#fff;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

/* ── Skeleton shimmer ── */
.sk-shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.6) 50%,transparent 100%);transform:translateX(-100%);animation:shimmer 1.4s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}

/* ── Load more ── */
.load-more-wrap{text-align:center;padding:28px 0 40px}
.load-more{background:#fff;border:1px solid #dfe1e5;border-radius:4px;padding:9px 24px;font-size:14px;font-family:inherit;color:#3c4043;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.load-more:hover{box-shadow:0 1px 3px rgba(0,0,0,.15);border-color:#dadce0}

/* ── Lightbox ── */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lb-inner{background:#fff;border-radius:12px;max-width:860px;width:90%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.lb-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #ebebeb}
.lb-title{font-size:14px;font-weight:500;color:#202124;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:80%}
.lb-close{width:32px;height:32px;border:none;background:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#5f6368;font-size:20px;line-height:1;flex-shrink:0}
.lb-close:hover{background:#f1f3f4}
.lb-body{display:flex;overflow:hidden;flex:1}
.lb-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:#f8f9fa;padding:16px;overflow:hidden}
.lb-img-wrap img{max-width:100%;max-height:70vh;border-radius:4px;object-fit:contain}
.lb-meta{width:220px;flex-shrink:0;padding:16px;border-left:1px solid #ebebeb;display:flex;flex-direction:column;gap:10px}
.lb-meta-source{font-size:12px;color:#70757a}
.lb-meta-title{font-size:14px;color:#202124;line-height:1.5}
.lb-meta-url{font-size:12px;color:#1a0dab;word-break:break-all;cursor:pointer}
.lb-meta-url:hover{text-decoration:underline}
.lb-btn{display:block;width:100%;padding:8px;border:1px solid #dfe1e5;border-radius:4px;text-align:center;font-size:13px;color:#1a73e8;cursor:pointer;background:none;font-family:inherit;margin-top:auto}
.lb-btn:hover{background:#e8f0fe}

footer{background:#f2f2f2;border-top:1px solid #e4e4e4;padding:14px 20px;font-size:13px;color:#70757a;margin-top:auto}
</style>
</head>
<body>

<!-- Header -->
<header>
  <a class="logo" href="/"><span>I</span><span>I</span><span>A</span><span>B</span></a>
  <div class="bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    <input type="text" id="q" autocomplete="off">
  </div>
</header>

<!-- Tabs -->
<nav class="tabs">
  <a class="tab" href="/results?q=" id="tab-all">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    All
  </a>
  <a class="tab active" href="/images?q=" id="tab-images">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    Images
  </a>
</nav>

<!-- Body -->
<div class="body">
  <div class="stats" id="stats"></div>



  <!-- Image grid (placeholder tiles) -->
  <div class="image-grid" id="image-grid">
    <!-- Tiles are injected by JS below -->
  </div>

  <div class="load-more-wrap">
    <button class="load-more" onclick="loadMore()">Show more results</button>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lb-inner">
    <div class="lb-top">
      <span class="lb-title" id="lb-title">Image title</span>
      <button class="lb-close" onclick="closeLightbox()">×</button>
    </div>
    <div class="lb-body">
      <div class="lb-img-wrap">
        <img id="lb-img" src="" alt="">
      </div>
      <div class="lb-meta">
        <div class="lb-meta-source" id="lb-source">source.org</div>
        <div class="lb-meta-title" id="lb-meta-title">Image description goes here</div>
        <div class="lb-meta-url" id="lb-url">https://source.org/page</div>
        <button class="lb-btn" onclick="visitPage()">Visit page</button>
      </div>
    </div>
  </div>
</div>

<footer>IIAB — Offline Knowledge</footer>

<script>
/* ── URL params ── */
var params = new URLSearchParams(location.search);
var query  = params.get('q') || '';
document.getElementById('q').value = query;
document.title = query + ' Images - IIAB Search';
document.getElementById('tab-all').href    = '/results?q=' + encodeURIComponent(query);
document.getElementById('tab-images').href = '/images-page?q=' + encodeURIComponent(query);

document.getElementById('q').addEventListener('keydown', function(e){
  if(e.key === 'Enter' && this.value.trim())
    location.href = '/images-page?q=' + encodeURIComponent(this.value.trim());
});

/* ── Skeleton loaders ── */
var SKELETON_COUNT = 16;

function showSkeletons(){
  var grid = document.getElementById('image-grid');
  grid.innerHTML = '';
  var heights = [180,240,200,280,160,220,300,190,250,170,260,210,320,180,240,200];
  for(var i = 0; i < SKELETON_COUNT; i++){
    var card = document.createElement('div');
    card.className = 'img-card';
    card.style.background = '#e8eaed';
    card.style.height = heights[i % heights.length] + 'px';
    card.innerHTML = '<div style="position:absolute;inset:0;overflow:hidden;border-radius:8px"><div class="sk-shimmer"></div></div>';
    grid.appendChild(card);
  }
}

/* ── All images from API ── */
var allImages = [];
var PAGE_SIZE = 24;
var currentOffset = 0;
var currentLightboxUrl = '';

/* ── Fetch from real /images endpoint ── */
async function doSearch(){
  showSkeletons();

  var start = Date.now();
  var res  = await fetch('/images?q=' + encodeURIComponent(query));
  var data = await res.json();
  var elapsed = ((Date.now() - start) / 1000).toFixed(2);

  allImages = data.images || [];
  document.getElementById('stats').textContent = allImages.length + ' images (' + elapsed + ' seconds)';

  currentOffset = 0;
  document.getElementById('image-grid').innerHTML = '';
  renderBatch();
}

function renderBatch(){
  var grid  = document.getElementById('image-grid');
  var batch = allImages.slice(currentOffset, currentOffset + PAGE_SIZE);
  batch.forEach(function(item, i){
    grid.appendChild(buildCard(item, currentOffset + i));
  });
  currentOffset += batch.length;

  // Hide load more if nothing left
  document.querySelector('.load-more-wrap').style.display =
    currentOffset >= allImages.length ? 'none' : 'block';
}

function buildCard(item, index){
  var card = document.createElement('div');
  card.className = 'img-card';
  card.addEventListener('click', function(){ openLightbox(item); });

  var img = document.createElement('img');
  img.src     = item.src;
  img.alt     = item.alt || item.title;
  img.loading = 'lazy';

  // If image fails to load, remove the card
  img.onerror = function(){ card.remove(); };

  var overlay = document.createElement('div');
  overlay.className = 'img-overlay';
  overlay.innerHTML = '<div class="img-source">' + (item.source || '') + '</div>'
                    + '<div class="img-title">'  + (item.title  || '') + '</div>';

  card.appendChild(img);
  card.appendChild(overlay);
  return card;
}

function loadMore(){
  renderBatch();
}

/* ── Lightbox ── */
function openLightbox(item){
  currentLightboxUrl = item.source;
  document.getElementById('lb-title').textContent      = item.title || item.alt;
  document.getElementById('lb-source').textContent     = item.source;
  document.getElementById('lb-meta-title').textContent = item.alt || item.title;
  document.getElementById('lb-url').textContent        = item.source;
  document.getElementById('lb-img').src = item.src;
  document.getElementById('lb-img').alt = item.alt || item.title;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox(e){
  if(e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lb-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function visitPage(){
  if(currentLightboxUrl) window.open(currentLightboxUrl, '_blank');
}

document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') closeLightbox({ target: document.getElementById('lightbox') });
});

/* ── Init ── */
doSearch();
</script>
</body>
</html>

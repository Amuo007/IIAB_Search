<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIAB Search - Results</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#202124;min-height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;padding:14px 20px;gap:16px;border-bottom:1px solid #ebebeb;position:sticky;top:0;background:#fff}
.logo{font-size:26px;font-weight:700;letter-spacing:-1px;flex-shrink:0;cursor:pointer}
.logo span:nth-child(1){color:#4285f4}
.logo span:nth-child(2){color:#ea4335}
.logo span:nth-child(3){color:#fbbc04}
.logo span:nth-child(4){color:#4285f4}
.bar{display:flex;align-items:center;flex:1;max-width:600px;border:1px solid #dfe1e5;border-radius:24px;padding:8px 14px;gap:10px;transition:box-shadow .2s}
.bar:hover,.bar:focus-within{box-shadow:0 1px 6px rgba(32,33,36,.28);border-color:transparent}
.bar input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:#202124;background:transparent}
.tabs{display:flex;align-items:center;padding:0 160px;border-bottom:1px solid #ebebeb;gap:4px}
.tab{display:flex;align-items:center;gap:6px;padding:12px 14px;font-size:13px;color:#5f6368;cursor:pointer;border-bottom:3px solid transparent;text-decoration:none;transition:color .15s}
.tab:hover{color:#202124;background:#f1f3f4;border-radius:4px 4px 0 0}
.tab.active{color:#1a73e8;border-bottom-color:#1a73e8}
.body{padding:20px 160px;flex:1}
.stats{font-size:13px;color:#70757a;margin-bottom:20px}
.ai-box{border:1px solid #dfe1e5;border-radius:12px;padding:18px 20px;margin-bottom:24px;background:#f8f9ff}
.ai-badge{font-size:11px;font-weight:600;color:#1a73e8;background:#e8f0fe;border-radius:10px;padding:3px 10px;margin-bottom:10px;display:inline-block}
.ai-text{font-size:14px;color:#3c4043;line-height:1.65;margin-top:8px}
.cursor{display:inline-block;width:2px;height:14px;background:#1a73e8;margin-left:2px;animation:blink .7s infinite;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.result{margin-bottom:28px}
.result-url{font-size:13px;color:#5f6368;margin-bottom:3px}
.result h3{font-size:20px;font-weight:400;color:#1a0dab;margin-bottom:4px;cursor:pointer}
.result h3:hover{text-decoration:underline}
.result p{font-size:14px;color:#4d5156;line-height:1.58}
.wordcount{font-size:12px;color:#70757a;margin-top:4px}
.loading{text-align:center;padding:60px;color:#5f6368;font-size:15px}
/* ── Skeleton loader ── */
.skeleton-item{margin-bottom:28px}
.sk{background:#e8eaed;border-radius:4px;position:relative;overflow:hidden}
.sk::after{content:'';position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);animation:shimmer 1.4s infinite}
@keyframes shimmer{100%{transform:translateX(100%)}}
.sk-url{height:13px;width:180px;margin-bottom:6px}
.sk-title{height:22px;width:420px;margin-bottom:6px}
.sk-title.short{width:280px}
.sk-line{height:14px;width:100%;margin-bottom:4px}
.sk-line.mid{width:75%}
.pages{display:flex;align-items:center;justify-content:center;gap:4px;padding:28px 0}
.pg{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;color:#1a0dab;cursor:pointer}
.pg:hover{background:#f1f3f4}
.pg.active{background:#1a73e8;color:#fff}
footer{background:#f2f2f2;border-top:1px solid #e4e4e4;padding:14px 20px;font-size:13px;color:#70757a;margin-top:auto}
@media(max-width:900px){.body{padding:16px}.tabs{padding:0 16px}}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="location.href='/'"><span>I</span><span>I</span><span>A</span><span>B</span></div>
  <div class="bar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    <input type="text" id="q" autocomplete="off">
  </div>
</header>

<nav class="tabs">
  <a class="tab active" href="#" id="tab-all">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    All
  </a>
  <a class="tab" href="#" id="tab-images">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    Images
  </a>
</nav>

<div class="body">
  <div class="stats" id="stats"></div>
  <div class="ai-box" id="ai-box" style="display:none">
    <span class="ai-badge">✦ AI Answer</span>
    <div class="ai-text" id="ai-text"><span class="cursor"></span></div>
  </div>
  <div id="results">
    <div class="skeleton-item"><div class="sk sk-url"></div><div class="sk sk-title"></div><div class="sk sk-line"></div><div class="sk sk-line mid"></div></div>
    <div class="skeleton-item"><div class="sk sk-url"></div><div class="sk sk-title short"></div><div class="sk sk-line"></div><div class="sk sk-line mid"></div></div>
    <div class="skeleton-item"><div class="sk sk-url"></div><div class="sk sk-title"></div><div class="sk sk-line"></div><div class="sk sk-line mid"></div></div>
    <div class="skeleton-item"><div class="sk sk-url"></div><div class="sk sk-title short"></div><div class="sk sk-line"></div><div class="sk sk-line mid"></div></div>
    <div class="skeleton-item"><div class="sk sk-url"></div><div class="sk sk-title"></div><div class="sk sk-line"></div><div class="sk sk-line mid"></div></div>
  </div>
</div>

<footer>IIAB — Offline Knowledge</footer>

<script>
var PER_PAGE = 6;
var currentPage = 1;
var allResults = [];

var params = new URLSearchParams(location.search);
var query = params.get('q') || '';
document.getElementById('q').value = query;
document.title = query + ' - IIAB Search';
document.getElementById('tab-all').href    = '/results?q=' + encodeURIComponent(query);
document.getElementById('tab-images').href = '/images-page?q='  + encodeURIComponent(query);

document.getElementById('q').addEventListener('keydown', function(e){
  if(e.key === 'Enter' && this.value.trim())
    location.href = '/results?q=' + encodeURIComponent(this.value.trim());
});

async function doSearch(){
  var start = Date.now();
  var res = await fetch('/search?q=' + encodeURIComponent(query));
  var data = await res.json();
  var elapsed = ((Date.now() - start) / 1000).toFixed(2);
  allResults = data.results;
  document.getElementById('stats').textContent = allResults.length + ' results (' + elapsed + ' seconds)';
  renderPage(1);
  streamAI();
}

function renderPage(page){
  currentPage = page;
  var start = (page - 1) * PER_PAGE;
  var end = start + PER_PAGE;
  var pageResults = allResults.slice(start, end);

  var html = '';
  pageResults.forEach(function(r){
    html += '<div class="result">';
    html += '<div class="result-url">' + r.url + '</div>';
    html += '<h3 onclick="location.href=\'' + r.url + '\'">' + r.title + '</h3>';
    html += '<p>' + r.snippet.slice(0, 200) + '...</p>';
    html += '<div class="wordcount">' + r.wordcount + '</div>';
    html += '</div>';
  });

  var totalPages = Math.ceil(allResults.length / PER_PAGE);
  html += '<div class="pages">';
  for(var i = 1; i <= totalPages; i++){
    html += '<span class="pg' + (i === page ? ' active' : '') + '" onclick="renderPage(' + i + ')">' + i + '</span>';
  }
  html += '</div>';

  document.getElementById('results').innerHTML = html;
  window.scrollTo(0, 0);
}

async function streamAI(){
  var box = document.getElementById('ai-box');
  var textEl = document.getElementById('ai-text');
  box.style.display = 'block';
  textEl.innerHTML = '<span class="cursor"></span>';

  var res = await fetch('/ai?q=' + encodeURIComponent(query));
  var reader = res.body.getReader();
  var decoder = new TextDecoder();
  var text = '';

  while(true){
    var result = await reader.read();
    if(result.done) break;
    text += decoder.decode(result.value);
    textEl.innerHTML = text + '<span class="cursor"></span>';
  }
  textEl.innerHTML = text;
}

doSearch();
</script>
</body>
</html>
